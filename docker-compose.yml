version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: career-client
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
